name: Build & Release Mission Icarus

on:
  push:
    branches: [main]
    tags: ["v*"]

permissions:
  contents: write

jobs:

  version-bump:
    name: Auto Version Bump
    if: startsWith(github.ref, 'refs/heads/main')
    runs-on: ubuntu-latest
    outputs:
      new_tag: ${{ steps.version.outputs.new_tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install --package-lock-only --ignore-scripts
      - run: npm ci --ignore-scripts

      - id: version
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          npm version patch --no-git-tag-version
          new_version=$(node -p "require('./package.json').version")
          git add package.json package-lock.json
          git commit -m "🔖 bump: release v${new_version}" || true
          git tag "v${new_version}"
          echo "new_tag=v${new_version}" >> $GITHUB_OUTPUT
      - run: git push origin main --follow-tags
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  create-release:
    name: Create GitHub Release
    needs: version-bump
    runs-on: ubuntu-latest
    outputs:
      new_tag: ${{ needs.version-bump.outputs.new_tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version-bump.outputs.new_tag }}
          name: Mission Icarus ${{ needs.version-bump.outputs.new_tag }}
          prerelease: false
          draft: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-macos:
    name: Build macOS Installer
    needs: create-release
    runs-on: macos-latest
    outputs:
      macos_files: ${{ steps.find_files.outputs.files }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.create-release.outputs.new_tag }}
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci --ignore-scripts
      - run: npx electron-rebuild -f -w better-sqlite3

      - name: Build Electron app (macOS)
        run: |
          VERSION=${{ needs.create-release.outputs.new_tag }}
          VERSION_NO_V="${VERSION#v}"
          brew install create-dmg || true
          npm run build -- --publish never
          APP_PATH=$(find "release/$VERSION_NO_V" -name "*.app" | head -n 1)
          xattr -r -d com.apple.quarantine "$APP_PATH" || true
          ZIP_NAME="release/$VERSION_NO_V/Icarus-Mac-${VERSION_NO_V}.zip"
          ditto -c -k --keepParent "$APP_PATH" "$ZIP_NAME"
      - id: find_files
        run: |
          VERSION=${{ needs.create-release.outputs.new_tag }}
          VERSION_NO_V="${VERSION#v}"
          RELEASE_DIR="release/$VERSION_NO_V"
          find "$RELEASE_DIR" -type f -name "*.zip" > files.txt
          FILES=$(paste -sd "," files.txt)
          echo "files=$FILES" >> $GITHUB_OUTPUT
      - name: Upload macOS installers
        uses: softprops/action-gh-release@v2
        if: steps.find_files.outputs.files != ''
        with:
          tag_name: ${{ needs.create-release.outputs.new_tag }}
          files: ${{ steps.find_files.outputs.files }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-windows:
    name: Build Windows Installer
    needs: build-macos
    runs-on: windows-latest
    outputs:
      windows_files: ${{ steps.find_files.outputs.files }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.build-macos.outputs.new_tag }}
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci --ignore-scripts
      - run: npx electron-rebuild -f -w better-sqlite3

      - name: Build (Windows)
        run: npm run build:windows -- --publish never

      - id: find_files
        shell: bash
        run: |
          VERSION=${{ needs.build-macos.outputs.new_tag }}
          VERSION_NO_V="${VERSION#v}"
          RELEASE_DIR="release/$VERSION_NO_V"
          find "$RELEASE_DIR" -type f -name "*.exe" > files.txt
          FILES=$(paste -sd "," files.txt)
          echo "files=$FILES" >> $GITHUB_OUTPUT
      - name: Upload Windows installers
        uses: softprops/action-gh-release@v2
        if: steps.find_files.outputs.files != ''
        with:
          tag_name: ${{ needs.build-macos.outputs.new_tag }}
          files: ${{ steps.find_files.outputs.files }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-linux:
    name: Build Linux Installer
    needs: build-windows
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.build-windows.outputs.new_tag }}
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: sudo apt-get update
      - run: sudo apt-get install -y fuse libarchive-tools

      - run: npm ci --ignore-scripts
      - run: npx electron-rebuild -f -w better-sqlite3

      - name: Build (Linux)
        run: npm run build:linux -- --publish never

      - id: find_files
        run: |
          VERSION=${{ needs.build-windows.outputs.new_tag }}
          VERSION_NO_V="${VERSION#v}"
          RELEASE_DIR="release/$VERSION_NO_V"
          find "$RELEASE_DIR" -type f -name "*.AppImage" > files.txt
          FILES=$(paste -sd "," files.txt)
          echo "files=$FILES" >> $GITHUB_OUTPUT
      - name: Upload Linux installers
        uses: softprops/action-gh-release@v2
        if: steps.find_files.outputs.files != ''
        with:
          tag_name: ${{ needs.build-windows.outputs.new_tag }}
          files: ${{ steps.find_files.outputs.files }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
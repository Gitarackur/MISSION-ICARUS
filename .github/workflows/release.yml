name: Build & Release Mission Icarus

on:
  push:
    branches: [main]
    tags: ["v*"]

permissions:
  contents: write

jobs:
  version-bump:
    name: Auto Version Bump
    if: startsWith(github.ref, 'refs/heads/main')
    runs-on: ubuntu-latest
    outputs:
      new_tag: ${{ steps.version.outputs.new_tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install --package-lock-only --ignore-scripts
      - run: npm ci --ignore-scripts

      - id: version
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          npm version patch --no-git-tag-version
          new_version=$(node -p "require('./package.json').version")

          git add package.json package-lock.json
          git commit -m "🔖 bump: release v${new_version}" || true
          git tag "v${new_version}"

          echo "new_tag=v${new_version}" >> $GITHUB_OUTPUT

      - run: git push origin main --follow-tags
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  create-release:
    name: Create GitHub Release
    needs: version-bump
    runs-on: ubuntu-latest
    outputs:
      new_tag: ${{ needs.version-bump.outputs.new_tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version-bump.outputs.new_tag }}
          name: Mission Icarus ${{ needs.version-bump.outputs.new_tag }}
          prerelease: false
          draft: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-and-upload:
    name: Build & Upload Installers
    needs: create-release
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.create-release.outputs.new_tag }}
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Rebuild native modules
        run: npx electron-rebuild -f -w better-sqlite3

      # - name: Build Electron app
      #   run: |
      #     VERSION=${{ needs.create-release.outputs.new_tag }}
      #     VERSION_NO_V="${VERSION#v}"
      #     echo "Building version: $VERSION_NO_V"

      #     if [ "${{ matrix.os }}" = "macos-latest" ]; then
      #       npm run build -- --publish never
      #     elif [ "${{ matrix.os }}" = "windows-latest" ]; then
      #       npm run build:windows -- --publish never
      #     else
      #       npm run build:linux -- --publish never
      #     fi
      #   shell: bash

      - name: Build Electron app
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
          ELECTRON_SKIP_NOTARIZATION: true
        run: |
          npm ci
          if [ "${{ matrix.os }}" = "macos-latest" ]; then
            brew install create-dmg || true
            npm run build -- --publish never
          elif [ "${{ matrix.os }}" = "windows-latest" ]; then
            npm run build:windows -- --publish never
          else
            sudo apt-get update
            sudo apt-get install -y fuse libarchive-tools
            npm run build:linux -- --publish never
          fi
        shell: bash

      - name: Find built installers dynamically
        id: find_files
        shell: bash
        run: |
          VERSION=${{ needs.create-release.outputs.new_tag }}
          VERSION_NO_V="${VERSION#v}"
          RELEASE_DIR="release/$VERSION_NO_V"

          echo "Looking for installers in $RELEASE_DIR"

          # Only match final Electron Builder installer names
          find "$RELEASE_DIR" -type f \( \
            -name "Icarus-Mac-*-Installer.dmg" -o \
            -name "Icarus-Windows-*-Setup.exe" -o \
            -name "Icarus-Windows-*-.exe" -o \
            -name "Icarus-Linux-*.AppImage" \
          \) > files.txt

          echo "Found installer files:"
          cat files.txt

          # Convert file list to comma-separated for GitHub Release upload
          FILES=$(paste -sd "," files.txt)
          echo "files=$FILES" >> $GITHUB_OUTPUT

      - name: Upload installers to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.create-release.outputs.new_tag }}
          files: ${{ steps.find_files.outputs.files }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

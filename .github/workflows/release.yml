name: Build & Release Mission Icarus

on:
  push:
    branches:
      - main
    tags:
      - "v*" # still handles manual version tags if you ever push them manually

permissions:
  contents: write

jobs:
  version-bump:
    name: Auto Version Bump
    if: startsWith(github.ref, 'refs/heads/main')
    runs-on: ubuntu-latest
    outputs:
      new_tag: ${{ steps.version.outputs.new_tag }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Fix lock file
        run: npm install --package-lock-only --ignore-scripts

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Bump patch version
        id: version
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # Commit any lock file changes first (package-lock.json and yarn.lock)
          git add package-lock.json yarn.lock 2>/dev/null || true
          git diff --quiet && git diff --staged --quiet || git commit -m "chore: update lock files"
          
          # Now bump version (npm version needs clean working dir)
          npm version patch --no-git-tag-version
          new_version=$(node -p "require('./package.json').version")
          
          # Commit the version bump and create tag
          git add package.json package-lock.json
          git commit -m "🔖 bump: release v${new_version}"
          git tag "v${new_version}"
          
          echo "new_tag=v${new_version}" >> $GITHUB_OUTPUT

      - name: Push new tag
        run: |
          git push origin main --follow-tags
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build:
    name: Build Electron App
    needs: version-bump
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [macos-latest, windows-latest]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Setup Python (Windows only)
        if: matrix.os == 'windows-latest'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install pipenv (Windows only)
        if: matrix.os == 'windows-latest'
        run: pip install pipenv

      - name: Install Python dependencies (Windows only)
        if: matrix.os == 'windows-latest'
        run: |
          pipenv install --dev
          pipenv run pip list

      - name: Fix lock file
        run: npm install --package-lock-only --ignore-scripts

      # Install dependencies WITHOUT running postinstall
      - name: Install dependencies (skip postinstall)
        run: npm ci --ignore-scripts

      # Now manually rebuild native modules (electron-rebuild is now available)
      - name: Rebuild native modules
        run: npx electron-rebuild -f -w better-sqlite3

      - name: Build app
        run: |
          if [ "${{ matrix.os }}" = "macos-latest" ]; then
            npm run build
          else
            npm run build:windows
          fi
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mission-icarus-${{ matrix.os }}
          path: |
            dist/
            dist-electron/
            release/
            *.dmg
            *.exe
            *.zip
          if-no-files-found: ignore

  release:
    name: Create GitHub Release
    needs: [build]
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: Determine release type
        id: release_type
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "type=stable" >> $GITHUB_OUTPUT
            echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          else
            echo "type=nightly" >> $GITHUB_OUTPUT
            echo "version=nightly-$(date +'%Y%m%d-%H%M%S')" >> $GITHUB_OUTPUT
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_type.outputs.version }}
          name: Mission Icarus ${{ steps.release_type.outputs.version }}
          prerelease: ${{ steps.release_type.outputs.type == 'nightly' }}
          draft: false
          files: artifacts/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
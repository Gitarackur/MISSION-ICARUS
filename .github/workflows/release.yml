name: Build & Release Mission Icarus

on:
  push:
    branches:
      - main
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  version-bump:
    name: Auto Version Bump
    if: startsWith(github.ref, 'refs/heads/main')
    runs-on: ubuntu-latest
    outputs:
      new_tag: ${{ steps.version.outputs.new_tag }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Bump patch version
        id: version
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          npm version patch --no-git-tag-version
          NEW_VERSION=$(node -p "require('./package.json').version")

          git add package.json package-lock.json
          git commit -m "🔖 bump: release v${NEW_VERSION}"
          git tag "v${NEW_VERSION}"

          echo "new_tag=v${NEW_VERSION}" >> $GITHUB_OUTPUT

      - name: Push new tag
        run: git push origin main --follow-tags
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  create-release:
    name: Create GitHub Release
    needs: version-bump
    runs-on: ubuntu-latest
    outputs:
      new_tag: ${{ needs.version-bump.outputs.new_tag }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Delete existing release if it exists
        continue-on-error: true
        run: |
          gh release delete ${{ needs.version-bump.outputs.new_tag }} --yes --cleanup-tag || echo "No existing release to delete"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        id: release
        with:
          tag_name: ${{ needs.version-bump.outputs.new_tag }}
          name: Mission Icarus ${{ needs.version-bump.outputs.new_tag }}
          prerelease: false
          draft: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-and-upload:
    name: Build & Upload Installers
    needs: create-release
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.version-bump.outputs.new_tag }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Python (Windows only)
        if: matrix.os == 'windows-latest'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install pipenv (Windows only)
        if: matrix.os == 'windows-latest'
        run: pip install pipenv

      - name: Install Python dependencies (Windows only)
        if: matrix.os == 'windows-latest'
        run: pipenv install --dev

      - name: Install Node dependencies
        run: npm ci --ignore-scripts

      - name: Rebuild native modules
        run: npx electron-rebuild -f -w better-sqlite3

      - name: Build app
        shell: bash
        run: |
          if [ "${{ matrix.os }}" = "macos-latest" ]; then
            npm run build -- --publish never
          elif [ "${{ matrix.os }}" = "windows-latest" ]; then
            npm run build:windows -- --publish never
          elif [ "${{ matrix.os }}" = "ubuntu-latest" ]; then
            npm run build:linux -- --publish never
          fi

      - name: Set release folder path
        id: folder
        shell: bash
        run: |
          VERSION="${{ needs.create-release.outputs.new_tag }}"
          VERSION_NO_V="${VERSION#v}"
          echo "folder_name=release/$VERSION_NO_V" >> $GITHUB_OUTPUT

      - name: Debug - list all files in release folder
        shell: bash
        run: |
          echo "Listing all files in ${{ steps.folder.outputs.folder_name }}:"
          if [ -d "${{ steps.folder.outputs.folder_name }}" ]; then
            find "${{ steps.folder.outputs.folder_name }}" -type f
          else
            echo "Release folder not found!"
          fi

      - name: Upload installers to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.create-release.outputs.new_tag }}
          files: |
            ${{ steps.folder.outputs.folder_name }}/**/*.dmg
            ${{ steps.folder.outputs.folder_name }}/**/*.exe
            ${{ steps.folder.outputs.folder_name }}/**/*.yml
            ${{ steps.folder.outputs.folder_name }}/**/*.zip
            ${{ steps.folder.outputs.folder_name }}/**/*.AppImage
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

name: Build & Publish Electron Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build and Upload Release
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Build Electron app
        run: npm run build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Debug – list built files
        run: |
          echo "Current directory: $(pwd)"
          if [ -d "releases" ]; then
            echo "Contents of releases/:"
            find releases -type f
          else
            echo "❌ No releases folder found. Check electron-builder config."
            exit 1
          fi

      - name: Upload built files to GitHub Release
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e

          TAG_NAME=${GITHUB_REF#refs/tags/}
          echo "Uploading assets for tag: $TAG_NAME"

          FILES=$(find releases -type f \( -name "*.exe" -o -name "*.dmg" -o -name "*.zip" -o -name "*.yml" -o -name "*.AppImage" \))
          if [ -z "$FILES" ]; then
            echo "❌ No installer files found in releases/"
            exit 1
          fi

          # Create the release if it doesn’t exist
          if ! gh release view "$TAG_NAME" >/dev/null 2>&1; then
            echo "Creating release for $TAG_NAME..."
            gh release create "$TAG_NAME" --title "$TAG_NAME" --notes "Automated release for $TAG_NAME"
          fi

          # Upload files
          for FILE in $FILES; do
            echo "Uploading: $FILE"
            gh release upload "$TAG_NAME" "$FILE" --clobber
          done

name: Build & Release Mission Icarus

on:
  push:
    branches: [main]
    tags: ["v*"]

permissions:
  contents: write

jobs:
  version-bump:
    name: Auto Version Bump
    if: startsWith(github.ref, 'refs/heads/main')
    runs-on: ubuntu-latest
    outputs:
      new_tag: ${{ steps.version.outputs.new_tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install --package-lock-only --ignore-scripts
      - run: npm ci --ignore-scripts

      - id: version
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          npm version patch --no-git-tag-version
          new_version=$(node -p "require('./package.json').version")

          git add package.json package-lock.json
          git commit -m "🔖 bump: release v${new_version}" || true
          git tag "v${new_version}"

          echo "new_tag=v${new_version}" >> $GITHUB_OUTPUT

      - run: git push origin main --follow-tags
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  create-release:
    name: Create GitHub Release
    needs: version-bump
    runs-on: ubuntu-latest
    outputs:
      new_tag: ${{ needs.version-bump.outputs.new_tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version-bump.outputs.new_tag }}
          name: Mission Icarus ${{ needs.version-bump.outputs.new_tag }}
          prerelease: false
          draft: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-and-upload:
    name: Build & Upload Installers
    needs: create-release
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.create-release.outputs.new_tag }}
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Rebuild native modules
        run: npx electron-rebuild -f -w better-sqlite3

      - name: Prepare macOS notarization assets
        if: matrix.os == 'macos-latest'
        shell: bash
        run: |
          if [ -n "${{ secrets.APPLE_API_KEY }}" ] && [ -n "${{ secrets.APPLE_API_KEY_ID }}" ]; then
            KEY_PATH="$RUNNER_TEMP/AuthKey_${{ secrets.APPLE_API_KEY_ID }}.p8"
            printf '%s' "${{ secrets.APPLE_API_KEY }}" > "$KEY_PATH"
            echo "APPLE_API_KEY_PATH=$KEY_PATH" >> "$GITHUB_ENV"
          fi

      - name: Build macOS app
        if: matrix.os == 'macos-latest'
        shell: bash
        env:
          APPLE_API_KEY_PATH: ${{ env.APPLE_API_KEY_PATH }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          VERSION=${{ needs.create-release.outputs.new_tag }}
          VERSION_NO_V="${VERSION#v}"
          echo "Building version: $VERSION_NO_V"

          brew install create-dmg || true

          if [ -n "${{ secrets.CSC_LINK }}" ] && [ -n "${{ secrets.CSC_KEY_PASSWORD }}" ]; then
            echo "Using mac signing credentials."
            export CSC_LINK="${{ secrets.CSC_LINK }}"
            export CSC_KEY_PASSWORD="${{ secrets.CSC_KEY_PASSWORD }}"
            npm run build -- --publish never
          else
            echo "No mac signing credentials detected. Building unsigned macOS artifacts."
            CSC_IDENTITY_AUTO_DISCOVERY=false npm run build -- --publish never
          fi

          APP_PATH=$(find "release/$VERSION_NO_V" -name "*.app" | head -n 1)
          echo "Found .app at: $APP_PATH"

          if [ -n "$APP_PATH" ]; then
            xattr -r -d com.apple.quarantine "$APP_PATH" || true
          fi

          if [ -n "$APP_PATH" ]; then
            ZIP_NAME="release/$VERSION_NO_V/Icarus-Mac-${VERSION_NO_V}.zip"
            ditto -c -k --keepParent "$APP_PATH" "$ZIP_NAME"
          fi

          if [ -n "$APP_PATH" ]; then
            TAR_NAME="release/$VERSION_NO_V/Icarus-Mac-${VERSION_NO_V}.tar.gz"
            APP_DIR=$(dirname "$APP_PATH")
            APP_NAME=$(basename "$APP_PATH")
            tar -C "$APP_DIR" -czf "$TAR_NAME" "$APP_NAME"
          fi

          if [ -z "${{ secrets.CSC_LINK }}" ] || [ -z "${{ secrets.CSC_KEY_PASSWORD }}" ]; then
            NOTE_PATH="release/$VERSION_NO_V/Icarus-Mac-${VERSION_NO_V}-Install-Notes.txt"
            cat > "$NOTE_PATH" <<EOF
            Icarus macOS install notes
            =========================

            This build is unsigned and not notarized. macOS may warn that the app is damaged
            or from an unidentified developer. That does not necessarily mean the app is broken.

            Recommended install path:
            1. Download the .tar.gz asset if available, or use the .zip asset.
            2. Extract the archive.
            3. Move Icarus.app into /Applications.
            4. If macOS blocks it, run:

               xattr -dr com.apple.quarantine /Applications/Icarus.app

            5. Then open the app again. If needed, right-click Icarus.app and choose Open.

            Full signing and notarization require Apple Developer credentials, which are not
            currently configured for this build.
            EOF
          fi

      - name: Build Windows app
        if: matrix.os == 'windows-latest'
        shell: bash
        run: npm run build:windows -- --publish never

      - name: Build Linux app
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y fuse libarchive-tools
          npm run build:linux -- --publish never

      - name: Find built installers dynamically
        id: find_files
        shell: bash
        env:
          HAS_MAC_SIGNING: ${{ secrets.CSC_LINK != '' && secrets.CSC_KEY_PASSWORD != '' }}
        run: |
          VERSION=${{ needs.create-release.outputs.new_tag }}
          VERSION_NO_V="${VERSION#v}"
          RELEASE_DIR="release/$VERSION_NO_V"

          echo "Looking for installers in $RELEASE_DIR"

          if [ "${{ matrix.os }}" = "macos-latest" ] && [ "$HAS_MAC_SIGNING" != "true" ]; then
            find "$RELEASE_DIR" -type f \( \
              -name "Icarus-Mac-*.zip" -o \
              -name "Icarus-Mac-*.tar.gz" -o \
              -name "Icarus-Mac-*-Install-Notes.txt" \
            \) > files.txt || true
          else
            find "$RELEASE_DIR" -type f \( \
              -name "Icarus-Mac-*-Installer.dmg" -o \
              -name "Icarus-Mac-*.zip" -o \
              -name "Icarus-Mac-*.tar.gz" -o \
              -name "Icarus-Mac-*-Install-Notes.txt" -o \
              -name "Icarus-Windows-*-Setup.exe" -o \
              -name "Icarus-Linux-*.AppImage" \
            \) > files.txt || true
          fi

          echo "Found installer files:"
          cat files.txt || echo "No installer files found."

          FILES=$(paste -sd "," files.txt)
          echo "files=$FILES" >> $GITHUB_OUTPUT

      - name: Upload installers to GitHub Release
        if: steps.find_files.outputs.files != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.create-release.outputs.new_tag }}
          files: ${{ steps.find_files.outputs.files }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

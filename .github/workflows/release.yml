name: Build & Release Mission Icarus

on:
  push:
    branches:
      - main
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  version-bump:
    name: Auto Version Bump
    if: startsWith(github.ref, 'refs/heads/main')
    runs-on: ubuntu-latest
    outputs:
      new_tag: ${{ steps.version.outputs.new_tag }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Fix lock file
        run: npm install --package-lock-only --ignore-scripts

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Bump patch version
        id: version
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add package-lock.json yarn.lock 2>/dev/null || true
          git diff --quiet && git diff --staged --quiet || git commit -m "chore: update lock files"

          npm version patch --no-git-tag-version
          new_version=$(node -p "require('./package.json').version")

          git add package.json package-lock.json
          git commit -m "🔖 bump: release v${new_version}"
          git tag "v${new_version}"

          echo "new_tag=v${new_version}" >> $GITHUB_OUTPUT

      - name: Push new tag
        run: git push origin main --follow-tags
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  create-release:
    name: Create GitHub Release
    needs: version-bump
    runs-on: ubuntu-latest
    outputs:
      new_tag: ${{ needs.version-bump.outputs.new_tag }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Delete existing release if it exists
        continue-on-error: true
        run: |
          gh release delete ${{ needs.version-bump.outputs.new_tag }} --yes --cleanup-tag || echo "No existing release to delete"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        id: release
        with:
          tag_name: ${{ needs.version-bump.outputs.new_tag }}
          name: Mission Icarus ${{ needs.version-bump.outputs.new_tag }}
          prerelease: false
          draft: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build:
    name: Build Electron App
    needs: create-release
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [macos-latest, windows-latest]
    outputs:
      artifact-name: installers-${{ matrix.os }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.version-bump.outputs.new_tag }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Python (Windows only)
        if: matrix.os == 'windows-latest'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install pipenv (Windows only)
        if: matrix.os == 'windows-latest'
        run: pip install pipenv

      - name: Install Python dependencies (Windows only)
        if: matrix.os == 'windows-latest'
        run: pipenv install --dev

      - name: Install Node dependencies
        run: npm ci --ignore-scripts

      - name: Rebuild native modules
        run: npx electron-rebuild -f -w better-sqlite3

      - name: Build app
        run: |
          if [ "${{ matrix.os }}" = "macos-latest" ]; then
            npm run build -- --publish never
          elif [ "${{ matrix.os }}" = "windows-latest" ]; then
            npm run build:windows -- --publish never
          fi
        shell: bash

      - name: Strip v from tag for release folder
        id: folder
        run: |
          VERSION="${{ needs.create-release.outputs.new_tag }}"
          VERSION_NO_V="${VERSION#v}"
          echo "folder_name=release/$VERSION_NO_V" >> $GITHUB_OUTPUT

      - name: Debug - list release files
        run: |
          echo "Contents of ${{ steps.folder.outputs.folder_name }}:"
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            powershell.exe -Command "Get-ChildItem -Recurse ${{ steps.folder.outputs.folder_name }}"
          else
            ls -R "${{ steps.folder.outputs.folder_name }}" || echo "No release folder found"
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: installers-${{ matrix.os }}
          path: ${{ steps.folder.outputs.folder_name }}

  upload-to-release:
    name: Upload installers to GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          name: installers-macos-latest
          path: release/macos

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: installers-windows-latest
          path: release/windows

      - name: Upload all to GitHub Release
        run: |
          gh release upload "${{ needs.create-release.outputs.new_tag }}" release/macos/* release/windows/* --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

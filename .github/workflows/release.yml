name: Build & Release Mission Icarus

on:
  push:
    branches:
      - main
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  version-bump:
    name: Auto Version Bump
    if: startsWith(github.ref, 'refs/heads/main')
    runs-on: ubuntu-latest
    outputs:
      new_tag: ${{ steps.version.outputs.new_tag }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Fix lock file
        run: npm install --package-lock-only --ignore-scripts

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Bump patch version
        id: version
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # Commit any lock file changes first (package-lock.json and yarn.lock)
          git add package-lock.json yarn.lock 2>/dev/null || true
          git diff --quiet && git diff --staged --quiet || git commit -m "chore: update lock files"
          
          # Now bump version (npm version needs clean working dir)
          npm version patch --no-git-tag-version
          new_version=$(node -p "require('./package.json').version")
          
          # Commit the version bump and create tag
          git add package.json package-lock.json
          git commit -m "🔖 bump: release v${new_version}"
          git tag "v${new_version}"
          
          echo "new_tag=v${new_version}" >> $GITHUB_OUTPUT

      - name: Push new tag
        run: |
          git push origin main --follow-tags
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  create-release:
    name: Create GitHub Release
    needs: version-bump
    runs-on: ubuntu-latest
    outputs:
      upload_url: ${{ steps.create_release.outputs.upload_url }}

    steps:
      - name: Create GitHub Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version-bump.outputs.new_tag }}
          name: Mission Icarus ${{ needs.version-bump.outputs.new_tag }}
          prerelease: false
          draft: false
          body: |
            Automated release for Mission Icarus ${{ needs.version-bump.outputs.new_tag }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build:
    name: Build Electron App
    needs: [version-bump, create-release]
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [macos-latest, windows-latest]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.version-bump.outputs.new_tag }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Setup Python (Windows only)
        if: matrix.os == 'windows-latest'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install pipenv (Windows only)
        if: matrix.os == 'windows-latest'
        run: pip install pipenv

      - name: Install Python dependencies (Windows only)
        if: matrix.os == 'windows-latest'
        run: pipenv install --dev

      - name: Fix lock file
        run: npm install --package-lock-only --ignore-scripts

      - name: Install dependencies (skip postinstall)
        run: npm ci --ignore-scripts

      - name: Rebuild native modules
        run: npx electron-rebuild -f -w better-sqlite3

      - name: Compile TypeScript and build with Vite
        run: |
          npx tsc
          npx vite build
        shell: bash

      - name: Build and publish app
        run: |
          if [ "${{ matrix.os }}" = "macos-latest" ]; then
            npx electron-builder --mac --publish always
          else
            npx electron-builder --win --publish always
          fi
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts (fallback)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: mission-icarus-${{ matrix.os }}
          path: |
            release/**/*
          if-no-files-found: ignore